<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open When...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/new-pages.css">
  <link rel="stylesheet" href="../shared/treasure-hunt.css">
</head>
<body>
  <main class="love-page">
    <div class="love-wrap">
      <nav class="love-nav" aria-label="Mahi pages">
        <a href="../index.html">Birthday</a>
        <a href="../things-i-never-said/">Confessions</a>
        <a href="../our-timeline/">Timeline</a>
        <a class="active" href="../open-when/">Open When</a>
        <a href="../mahi-ai/">Mahi AI</a>
        <a href="../future-mahi/">Future Mahi</a>
        <a href="../treasure-hunt/">Treasure Hunt</a>
      </nav>

      <section class="love-hero">
        <div>
          <p class="eyebrow">Tiny envelopes for the days that feel heavy</p>
          <h1>Open When...</h1>
          <p class="hero-copy">Tap any card when that mood finds you.</p>
        </div>
      </section>

      <section class="love-card">
        <div class="open-grid">
          <button class="open-card" data-open-when="sad">
            <div class="open-card-title">You're Sad</div>
            <div class="open-message"></div>
          </button>
          <button class="open-card" data-open-when="angry">
            <div class="open-card-title">You're Angry</div>
            <div class="open-message"></div>
          </button>
          <button class="open-card" data-open-when="miss">
            <div class="open-card-title">You Miss Me</div>
            <div class="open-message"></div>
          </button>
          <button class="open-card" data-open-when="period">
            <div class="open-card-title">You're On Your Period</div>
            <div class="open-message"></div>
          </button>
          <button class="open-card" data-open-when="motivation">
            <div class="open-card-title">You Need Motivation</div>
            <div class="open-message"></div>
          </button>
          <button class="open-card" data-open-when="unloved">
            <div class="open-card-title">You Feel Unloved</div>
            <div class="open-message"></div>
          </button>
        </div>
      </section>
    </div>
  </main>
  <button class="treasure-heart pos-open-when" data-treasure-heart="open-when" aria-label="Hidden golgappa">&#129375;</button>
  <script src="../shared/new-pages.js"></script>
  <script src="../shared/treasure-hunt.js"></script>
</body>
</html>
