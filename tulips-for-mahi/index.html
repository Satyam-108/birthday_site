<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulips For Mahi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: #ffe8ee;
      font-family: "Patrick Hand", cursive;
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 150, 180, 0.20), transparent 28%),
        radial-gradient(circle at 18% 22%, rgba(199, 95, 123, 0.15), transparent 24%),
        linear-gradient(180deg, #150d14 0%, #26111f 50%, #110b12 100%);
    }

    .tulip-page {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 4vw, 38px);
      isolation: isolate;
    }

    .back-link {
      position: relative;
      z-index: 5;
      width: fit-content;
      color: #ffdbe4;
      text-decoration: none;
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(255, 232, 238, 0.10);
      border: 1px solid rgba(255, 232, 238, 0.18);
      backdrop-filter: blur(4px);
    }

    .intro {
      position: relative;
      z-index: 3;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
      align-self: start;
      padding-top: clamp(12px, 3vw, 36px);
    }

    .intro p {
      margin: 0;
      color: rgba(255, 232, 238, 0.78);
      font-size: clamp(20px, 2.8vw, 30px);
    }

    h1 {
      margin: 4px 0 0;
      font-family: "Caveat", cursive;
      font-size: clamp(54px, 11vw, 118px);
      line-height: 0.92;
      color: #ffd3df;
      text-shadow: 0 0 26px rgba(255, 121, 160, 0.34);
    }

    .garden {
      position: relative;
      z-index: 2;
      width: min(100%, 1120px);
      min-height: 58vh;
      margin: 0 auto;
      align-self: center;
    }

    .garden::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 48%;
      width: min(82vw, 680px);
      height: min(62vw, 560px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 214, 228, 0.45), rgba(255, 146, 181, 0.18) 38%, transparent 70%),
        radial-gradient(circle, rgba(255, 244, 224, 0.13), transparent 66%);
      filter: blur(18px);
      pointer-events: none;
    }

    .bouquet {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(108vw, 1080px);
      height: min(76vh, 740px);
      transform: translate(-50%, -47%);
      transform-origin: 50% 100%;
      animation: bouquetBreathe 7s ease-in-out infinite;
    }

    .tulip {
      position: absolute;
      bottom: 0;
      width: 132px;
      height: var(--height);
      left: var(--x);
      transform-origin: 50% 100%;
      z-index: var(--z);
      animation: wind 5.2s ease-in-out infinite;
      animation-delay: var(--wind-delay);
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 34px;
      height: calc(var(--height) - 62px);
      border-left: 8px solid rgba(103, 176, 93, 0.96);
      border-radius: 50% 0 0 50%;
      background: transparent;
      transform: translateX(-50%) scaleY(0);
      transform-origin: bottom;
      animation: growStem 1.35s ease forwards;
      animation-delay: var(--delay);
      box-shadow: -7px 0 14px rgba(124, 211, 131, 0.12);
      transform: translateX(-50%) rotate(var(--stem-rot, 0deg)) scaleY(0);
    }

    .stem::after {
      content: "";
      position: absolute;
      left: -8px;
      top: 0;
      width: 8px;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(180deg, #b4e79b 0%, #6fb86a 48%, #2f6846 100%);
      box-shadow: inset -2px 0 4px rgba(29, 78, 45, 0.28), 0 0 14px rgba(132, 214, 128, 0.18);
    }

    .leaf {
      position: absolute;
      bottom: 70px;
      width: 68px;
      height: 25px;
      border-radius: 100% 0 100% 0;
      background:
        linear-gradient(115deg, rgba(180, 230, 145, 0.96), rgba(82, 149, 75, 0.98) 55%, rgba(37, 86, 54, 0.98));
      box-shadow: inset -8px -4px 12px rgba(21, 67, 43, 0.18), 0 8px 16px rgba(0,0,0,0.10);
      opacity: 0;
      animation: leafIn .8s ease forwards;
      animation-delay: calc(var(--delay) + .62s);
    }

    .leaf::after,
    .base-leaf::after {
      content: "";
      position: absolute;
      left: 14%;
      top: 50%;
      width: 76%;
      height: 1px;
      background: rgba(228, 255, 213, 0.36);
      transform: rotate(-7deg);
    }

    .leaf.left {
      left: -2px;
      transform-origin: right center;
      transform: rotate(-34deg) scale(.65);
    }

    .leaf.right {
      right: -4px;
      bottom: 118px;
      transform-origin: left center;
      transform: rotate(32deg) scale(.65);
    }

    .bloom {
      position: absolute;
      left: 50%;
      top: 0;
      width: 86px;
      height: 89px;
      transform: translateX(-50%) scale(0);
      transform-origin: center bottom;
      filter:
        drop-shadow(0 0 24px rgba(255, 143, 177, 0.56))
        drop-shadow(0 0 42px rgba(255, 182, 203, 0.18))
        drop-shadow(0 8px 12px rgba(73, 18, 46, 0.22));
      animation: bloomIn .92s cubic-bezier(.2, 1.4, .4, 1) forwards;
      animation-delay: calc(var(--delay) + 1.04s);
      scale: var(--scale, 1);
    }

    .petal {
      position: absolute;
      bottom: 0;
      width: 50px;
      height: 74px;
      border-radius: 80% 80% 48% 48%;
      background:
        radial-gradient(circle at 36% 17%, rgba(255,255,255,0.68), transparent 27%),
        radial-gradient(circle at 62% 34%, rgba(255, 196, 211, 0.58), transparent 31%),
        linear-gradient(155deg, #ffe2ea 0%, #ffc0cf 26%, #f17ca2 63%, #b94370 100%);
      box-shadow:
        inset 7px 6px 15px rgba(255,255,255,0.28),
        inset -8px -14px 20px rgba(116, 28, 65, 0.22),
        0 0 18px rgba(255, 143, 177, 0.24);
    }

    .petal.center {
      left: 18px;
      z-index: 3;
    }

    .petal.left {
      left: 2px;
      z-index: 2;
      transform: rotate(-20deg);
    }

    .petal.right {
      right: 2px;
      z-index: 2;
      transform: rotate(20deg);
    }

    .petal.back {
      left: 21px;
      z-index: 1;
      height: 70px;
      background:
        radial-gradient(circle at 44% 16%, rgba(255,255,255,0.56), transparent 28%),
        linear-gradient(180deg, #fff0f4 0%, #f5a4bc 58%, #c75680 100%);
      transform: translateY(4px);
    }

    .top-sparkle {
      position: absolute;
      left: 50%;
      top: 10px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 244, 219, 0.92);
      box-shadow:
        -34px 10px 0 -2px rgba(255, 220, 232, 0.80),
        31px 18px 0 -2px rgba(255, 220, 232, 0.76),
        0 0 18px rgba(255, 225, 180, 0.84);
      opacity: 0;
      animation: sparkleNearTop 2.8s ease-in-out infinite;
      animation-delay: calc(var(--delay) + 1.4s);
      pointer-events: none;
    }

    .base-leaf {
      position: absolute;
      left: var(--x);
      bottom: var(--bottom);
      z-index: var(--z);
      width: var(--w);
      height: var(--h);
      border-radius: 100% 0 100% 0;
      background:
        linear-gradient(115deg, rgba(166, 219, 130, 0.90), rgba(60, 124, 67, 0.96) 68%, rgba(29, 72, 47, 0.96));
      box-shadow: inset -10px -5px 16px rgba(22, 70, 43, 0.20), 0 12px 22px rgba(0,0,0,0.13);
      transform: rotate(var(--rot));
      transform-origin: var(--origin);
      opacity: 0.92;
      animation: baseLeafSway 5.6s ease-in-out infinite;
      animation-delay: var(--delay);
      pointer-events: none;
    }

    .exit-petal {
      position: fixed;
      z-index: 12;
      left: var(--left);
      top: -36px;
      width: var(--size);
      height: calc(var(--size) * 1.36);
      border-radius: 72% 28% 72% 28%;
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,0.55), transparent 30%),
        linear-gradient(145deg, rgba(255, 212, 225, 0.95), rgba(233, 103, 148, 0.82));
      box-shadow: 0 0 18px rgba(255, 156, 189, 0.42);
      pointer-events: none;
      animation: exitPetalFall 1s ease-in forwards;
    }

    .message {
      position: absolute;
      left: 50%;
      top: -48px;
      width: max-content;
      max-width: min(70vw, 360px);
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      padding: 9px 14px;
      border-radius: 999px;
      color: #ffe8ee;
      background: rgba(255, 232, 238, 0.12);
      border: 1px solid rgba(255, 232, 238, 0.18);
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      backdrop-filter: blur(5px);
      font-size: clamp(17px, 2vw, 24px);
      animation: floatMessage 3.2s ease forwards;
      animation-delay: calc(var(--delay) + 1.7s);
    }

    .final-note {
      position: relative;
      z-index: 4;
      max-width: 780px;
      min-height: 120px;
      margin: 0 auto 8px;
      text-align: center;
      font-family: "Caveat", cursive;
      font-size: clamp(31px, 6vw, 70px);
      line-height: 1.08;
      color: #ffd8e2;
      text-shadow: 0 0 30px rgba(255, 121, 160, 0.26);
    }

    .final-line {
      display: none;
      animation: softReveal .85s ease forwards;
    }

    .final-line.show {
      display: block;
    }

    .heart-open {
      display: none;
      align-items: center;
      justify-content: center;
      width: fit-content;
      margin: 20px auto 0;
      padding: 12px 24px;
      border: 1px solid rgba(255, 218, 228, 0.42);
      border-radius: 999px;
      color: #fff3f7;
      background: linear-gradient(135deg, rgba(231, 100, 145, 0.88), rgba(255, 169, 194, 0.82));
      box-shadow:
        0 0 22px rgba(255, 127, 166, 0.34),
        0 12px 30px rgba(75, 20, 45, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.32);
      font: 700 clamp(18px, 2vw, 24px) "Patrick Hand", cursive;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, filter .22s ease;
      animation: softReveal .85s ease forwards, heartPulse 2.4s ease-in-out infinite;
    }

    #mahiLine.show ~ .heart-open {
      display: inline-flex;
    }

    .heart-open:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.05);
      animation-play-state: paused;
      box-shadow:
        0 0 34px rgba(255, 127, 166, 0.48),
        0 16px 34px rgba(75, 20, 45, 0.26),
        inset 0 1px 0 rgba(255,255,255,0.38);
    }

    .tulip-page {
      transition: opacity 1s ease, transform 1s ease, filter 1s ease;
    }

    body.heart-transition .tulip-page {
      opacity: 0;
      transform: scale(.985);
      filter: blur(5px);
    }

    .particle {
      position: fixed;
      z-index: 1;
      left: var(--left);
      top: 110vh;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 185, 205, 0.72);
      box-shadow: 0 0 14px rgba(255, 148, 180, 0.7);
      animation: particleFloat var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .petal-fall {
      position: fixed;
      z-index: 1;
      left: var(--left);
      top: -32px;
      width: var(--size);
      height: calc(var(--size) * 1.35);
      border-radius: 72% 28% 72% 28%;
      background:
        radial-gradient(circle at 34% 24%, rgba(255,255,255,0.48), transparent 30%),
        linear-gradient(145deg, rgba(255, 205, 219, 0.88), rgba(231, 100, 145, 0.68));
      box-shadow: 0 0 14px rgba(255, 158, 188, 0.30);
      opacity: 0.76;
      animation: petalFall var(--duration) linear infinite;
      animation-delay: var(--delay);
      pointer-events: none;
    }

    @keyframes growStem {
      to { transform: translateX(-50%) rotate(var(--stem-rot, 0deg)) scaleY(1); }
    }

    @keyframes leafIn {
      to {
        opacity: 1;
        transform: rotate(var(--leaf-rotate, -28deg)) scale(1);
      }
    }

    @keyframes bloomIn {
      0% { transform: translateX(-50%) scale(0) rotate(-6deg); opacity: 0; }
      70% { transform: translateX(-50%) scale(1.08) rotate(3deg); opacity: 1; }
      100% { transform: translateX(-50%) scale(1) rotate(0); opacity: 1; }
    }

    @keyframes floatMessage {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
      18%, 75% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }

    @keyframes wind {
      0%, 100% { transform: rotate(-1.2deg); }
      50% { transform: rotate(1.45deg); }
    }

    @keyframes bouquetBreathe {
      0%, 100% { transform: translate(-50%, -47%) rotate(-.35deg); }
      50% { transform: translate(-50%, -47%) rotate(.35deg); }
    }

    @keyframes particleFloat {
      to {
        transform: translate3d(28px, -125vh, 0);
        opacity: 0;
      }
    }

    @keyframes baseLeafSway {
      0%, 100% { transform: rotate(var(--rot)) translateY(0); }
      50% { transform: rotate(calc(var(--rot) + 2.4deg)) translateY(-2px); }
    }

    @keyframes sparkleNearTop {
      0%, 100% { opacity: 0; transform: translateX(-50%) scale(.72) rotate(0deg); }
      38%, 62% { opacity: .95; transform: translateX(-50%) scale(1.08) rotate(18deg); }
    }

    @keyframes heartPulse {
      0%, 100% { box-shadow: 0 0 22px rgba(255, 127, 166, 0.34), 0 12px 30px rgba(75, 20, 45, 0.22), inset 0 1px 0 rgba(255,255,255,0.32); }
      50% { box-shadow: 0 0 34px rgba(255, 127, 166, 0.46), 0 14px 32px rgba(75, 20, 45, 0.24), inset 0 1px 0 rgba(255,255,255,0.36); }
    }

    @keyframes petalFall {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.76; }
      100% { transform: translate3d(var(--drift), 112vh, 0) rotate(320deg); opacity: 0; }
    }

    @keyframes exitPetalFall {
      0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(.8); opacity: 0; }
      12% { opacity: .95; }
      100% { transform: translate3d(var(--drift), 112vh, 0) rotate(360deg) scale(1.08); opacity: 0; }
    }

    @keyframes softReveal {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      body {
        overflow-y: auto;
      }

      .tulip-page {
        min-height: 100svh;
        padding: 14px;
      }

      .intro {
        padding-top: 12px;
      }

      .garden {
        min-height: 56vh;
      }

      .bouquet {
        width: 128vw;
        height: 560px;
      }

      .tulip {
        width: 86px;
      }

      .message {
        max-width: 82vw;
        white-space: normal;
      }

      .final-note {
        min-height: 100px;
      }
    }
  </style>
</head>
<body>
  <main class="tulip-page">
    <a class="back-link" href="../index.html">Back to birthday page</a>

    <section class="intro">
      <p>A quiet garden I built just for you</p>
      <h1>Tulips For Mahi</h1>
    </section>

    <section class="garden" aria-label="Animated cluster of nine pink tulips">
      <div class="bouquet" id="bouquet"></div>
    </section>

    <section class="final-note" aria-live="polite">
      <div class="final-line" id="lastingLine">Some people give flowers.<br>I wanted to build something that lasts longer.</div>
      <div class="final-line" id="mahiLine">These tulips are for you, Mahi &#127799;</div>
      <button class="heart-open" id="heartOpenButton" type="button">&#10084; Open My Heart</button>
    </section>
  </main>

  <script>
    const messages = [
      "You make ordinary days special.",
      "Thank you for choosing me.",
      "You are my favorite notification.",
      "You make distance feel smaller.",
      "I'm lucky to have you.",
      "Every tulip reminds me of you.",
      "Forever grateful for you &#10084;"
    ];

    const bouquet = document.getElementById("bouquet");
    const baseLeaves = [
      { x: "22%", bottom: "18px", w: "168px", h: "44px", rot: "-38deg", z: 4, origin: "right center", delay: "-.7s" },
      { x: "31%", bottom: "52px", w: "150px", h: "40px", rot: "-27deg", z: 6, origin: "right center", delay: "-1.6s" },
      { x: "40%", bottom: "76px", w: "132px", h: "36px", rot: "-15deg", z: 8, origin: "right center", delay: "-2.4s" },
      { x: "50%", bottom: "88px", w: "142px", h: "38px", rot: "0deg", z: 9, origin: "center center", delay: "-1.1s" },
      { x: "58%", bottom: "76px", w: "132px", h: "36px", rot: "15deg", z: 8, origin: "left center", delay: "-2.0s" },
      { x: "66%", bottom: "52px", w: "150px", h: "40px", rot: "27deg", z: 6, origin: "left center", delay: "-1.4s" },
      { x: "74%", bottom: "18px", w: "168px", h: "44px", rot: "38deg", z: 4, origin: "left center", delay: "-2.8s" }
    ];

    baseLeaves.forEach((leaf) => {
      const el = document.createElement("span");
      el.className = "base-leaf";
      el.style.setProperty("--x", leaf.x);
      el.style.setProperty("--bottom", leaf.bottom);
      el.style.setProperty("--w", leaf.w);
      el.style.setProperty("--h", leaf.h);
      el.style.setProperty("--rot", leaf.rot);
      el.style.setProperty("--z", leaf.z);
      el.style.setProperty("--origin", leaf.origin);
      el.style.setProperty("--delay", leaf.delay);
      bouquet.appendChild(el);
    });

    const positions = [
      { x: "49%", height: "650px", delay: 0.2, z: 22, scale: 1.22, rot: "0deg" },
      { x: "38%", height: "560px", delay: 1.05, z: 19, scale: 1.12, rot: "-7deg" },
      { x: "60%", height: "560px", delay: 1.9, z: 19, scale: 1.12, rot: "7deg" },
      { x: "29%", height: "455px", delay: 2.75, z: 15, scale: 1.02, rot: "-13deg" },
      { x: "49%", height: "510px", delay: 3.6, z: 20, scale: 1.08, rot: "0deg" },
      { x: "69%", height: "455px", delay: 4.45, z: 15, scale: 1.02, rot: "13deg" },
      { x: "22%", height: "360px", delay: 5.3, z: 12, scale: .94, rot: "-18deg" },
      { x: "41%", height: "390px", delay: 6.15, z: 14, scale: .98, rot: "-6deg" },
      { x: "58%", height: "390px", delay: 7.0, z: 14, scale: .98, rot: "6deg" }
    ];

    positions.forEach((item, index) => {
      const tulip = document.createElement("div");
      tulip.className = "tulip";
      tulip.style.setProperty("--x", item.x);
      tulip.style.setProperty("--height", item.height);
      tulip.style.setProperty("--delay", `${item.delay}s`);
      tulip.style.setProperty("--wind-delay", `${index * -.45}s`);
      tulip.style.setProperty("--z", item.z);
      tulip.style.setProperty("--scale", item.scale);
      tulip.style.setProperty("--stem-rot", item.rot);
      const message = messages[index] ? `<div class="message">${messages[index]}</div>` : "";
      tulip.innerHTML = `
        <div class="stem"></div>
        <div class="leaf left" style="--leaf-rotate:-34deg"></div>
        <div class="leaf right" style="--leaf-rotate:32deg"></div>
        <div class="bloom">
          <div class="petal back"></div>
          <div class="petal left"></div>
          <div class="petal right"></div>
          <div class="petal center"></div>
        </div>
        <div class="top-sparkle"></div>
        ${message}
      `;
      bouquet.appendChild(tulip);
    });

    for (let i = 0; i < 38; i++) {
      const particle = document.createElement("span");
      particle.className = "particle";
      particle.style.setProperty("--left", `${Math.random() * 100}vw`);
      particle.style.setProperty("--duration", `${8 + Math.random() * 8}s`);
      particle.style.setProperty("--delay", `${Math.random() * 9}s`);
      document.body.appendChild(particle);
    }

    for (let i = 0; i < 22; i++) {
      const petal = document.createElement("span");
      petal.className = "petal-fall";
      petal.style.setProperty("--left", `${Math.random() * 100}vw`);
      petal.style.setProperty("--size", `${8 + Math.random() * 8}px`);
      petal.style.setProperty("--duration", `${9 + Math.random() * 8}s`);
      petal.style.setProperty("--delay", `${Math.random() * 10}s`);
      petal.style.setProperty("--drift", `${-40 + Math.random() * 80}px`);
      document.body.appendChild(petal);
    }

    setTimeout(() => {
      document.getElementById("lastingLine").classList.add("show");
    }, 12200);

    setTimeout(() => {
      document.getElementById("lastingLine").classList.remove("show");
      document.getElementById("mahiLine").classList.add("show");
    }, 15200);

    document.getElementById("heartOpenButton").addEventListener("click", () => {
      if (document.body.classList.contains("heart-transition")) return;
      document.body.classList.add("heart-transition");

      for (let i = 0; i < 46; i++) {
        const petal = document.createElement("span");
        petal.className = "exit-petal";
        petal.style.setProperty("--left", `${Math.random() * 100}vw`);
        petal.style.setProperty("--size", `${9 + Math.random() * 10}px`);
        petal.style.setProperty("--drift", `${-90 + Math.random() * 180}px`);
        document.body.appendChild(petal);
      }

      setTimeout(() => {
        window.location.href = "../love-heart/index.html";
      }, 1000);
    });
  </script>
  <script src="../shared/music-manager.js"></script>
</body>
</html>
